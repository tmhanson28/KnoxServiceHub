<!DOCTYPE html>
<html>
<head>
  <title>Get a Quote | KnoxServiceHub</title>
</head>
<body style="font-family: Arial; margin: 0; background: #f7f7f7;">

  <div style="max-width: 700px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px;">
    <h1 style="text-align: center;">Request a Quote</h1>
    <p style="text-align: center;">Tell us what you need and we’ll connect you with trusted local contractors.</p>

    <form>
      <label><b>Full Name</b></label><br>
      <input type="text" style="width: 100%; padding: 12px; margin: 8px 0 20px 0;"><br>

      <label><b>Phone Number</b></label><br>
      <input type="tel" style="width: 100%; padding: 12px; margin: 8px 0 20px 0;"><br>

      <label><b>Service Needed</b></label><br>
      <select style="width: 100%; padding: 12px; margin: 8px 0 20px 0;">
        <option>Roofing</option>
        <option>HVAC</option>
        <option>Plumbing</option>
        <option>Electrical</option>
        <option>Landscaping</option>
        <option>Handyman</option>
      </select><br>

      <label><b>ZIP Code</b></label><br>
      <input type="text" style="width: 100%; padding: 12px; margin: 8px 0 20px 0;"><br>

      <label><b>Describe Your Project</b></label><br>
      <textarea style="width: 100%; padding: 12px; margin: 8px 0 20px 0; height: 120px;"></textarea><br>

      <button type="submit" style="width: 100%; padding: 15px; font-size: 18px; background: #f59e0b; border: none; cursor: pointer;">
        Submit Request
      </button>
    </form>
  </div>

</body>
</html>
